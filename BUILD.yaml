packages:
  - name: app
    type: go
    env:
      - CGO_ENABLED=0
    srcs:
      - "**/*.go"
      - "**/*.html"
      - "**/*.js"
      - go.mod
      - go.sum
    argdeps:
      - version
    config:
      dontTest: true
      packaging: app
      buildCommand:
        [
          "sh",
          "-c",
          'go build -o leeway -trimpath -ldflags "-s -w -X main.version=${version}"',
        ]
  - name: goreleaser
    type: generic
    config:
      commands:
        - ["curl", "-OL", "https://github.com/goreleaser/goreleaser/releases/download/v1.10.3/goreleaser_Linux_x86_64.tar.gz"]
        - ["tar", "xzf", "goreleaser_Linux_x86_64.tar.gz"]
        - ["rm", "goreleaser_Linux_x86_64.tar.gz"]
  - name: docker
    type: docker
    srcs:
      - ".gitpod.Dockerfile"
    deps:
      - :app
    config:
      dockerfile: .gitpod.Dockerfile
scripts:
  - name: release
    description: releases leeway to GitHub
    deps:
      - :goreleaser
    script: |
      if [ "A$GITHUB_TOKEN" = "A" ]; then
        echo "Please set the GITHUB_TOKEN env var"
        exit 1
      fi

      if [ $(git tag | grep ${version}) ]; then
        git tag --delete ${version}
        git push origin --delete ${version} || echo "version wasn't pushed yet - that's ok"
      fi

      git tag ${version}
      git push origin ${version}
      goreleaser --rm-dist
