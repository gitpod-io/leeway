defaultTarget: "//:app"
defaultArgs:
  version: dev
environmentManifest:
  - name: "node"
    command: ["node", "--version"]
  - name: "yarn"
    command: ["yarn", "--version"]
provenance:
  enabled: true
  slsa: true
sbom:
  enabled: true
  scanCVE: true
  failOn: ["critical"]
  ignoreVulnerabilities:
    - vulnerability: CVE-2024-40635
      reason: "false positive"
variants:
- name: nogit
  srcs:
    exclude:
    - "**/.git"
