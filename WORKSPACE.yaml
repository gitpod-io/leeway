defaultTarget: "//:app"
defaultArgs:
  version: dev
environmentManifest:
  - name: "node"
    command: ["node", "--version"]
  - name: "yarn"
    command: ["yarn", "--version"]
provenance:
  enabled: true
  slsa: true
sbom:
  enabled: true
  format: "cyclonedx"
variants:
- name: nogit
  srcs:
    exclude:
    - "**/.git"
